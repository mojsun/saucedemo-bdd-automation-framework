[behave]
paths = features
format = pretty
stdout_capture = no
stderr_capture = no

# HTML report (for portfolio / sharing). Run: behave -f behave_html_formatter:HTMLFormatter -o reports/behave-report.html
[behave.formatters]
html = behave_html_formatter:HTMLFormatter

# Uncomment to generate Allure results:
# format = allure_behave.formatter:AllureFormatter
# outfiles = reports/allure-results
